<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <defs>
    <marker id="arrowhead" refX="10" refY="3.5" markerHeight="7" markerWidth="10" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#f8f9fa" width="800" height="500"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">ABAC Authorization Flow</text>

  <!-- User Attributes -->
  <rect x="50" y="60" width="120" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="110" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">User: Dr. Smith</text>
  <text x="110" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Dept: Cardiology</text>
  <text x="110" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Role: Doctor</text>
  <text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Clearance: Level 3</text>

  <!-- Resource Attributes -->
  <rect x="630" y="60" width="120" height="80" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="690" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Patient Record</text>
  <text x="690" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Owner: Dr. Johnson</text>
  <text x="690" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Classification: L3</text>
  <text x="690" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Dept: Cardiology</text>

  <!-- Environment Context -->
  <rect x="50" y="180" width="120" height="80" rx="10" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="110" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Environment</text>
  <text x="110" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Time: 14:30</text>
  <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Location: Hospital</text>
  <text x="110" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">IP: 10.0.1.100</text>

  <!-- Action -->
  <rect x="630" y="180" width="120" height="50" rx="10" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="690" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Action: READ</text>
  <text x="690" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Urgency: Normal</text>

  <!-- Request Arrow -->
  <line x1="170" y1="100" x2="280" y2="100" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Access Request</text>

  <!-- Policy Engine -->
  <rect x="300" y="60" width="200" height="200" rx="10" fill="white" stroke="#34495e" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">ABAC Policy Engine</text>

  <!-- Policy Rules -->
  <rect x="320" y="100" width="160" height="30" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">✓ Clearance Level Check</text>

  <rect x="320" y="135" width="160" height="30" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">✓ Department Match</text>

  <rect x="320" y="170" width="160" height="30" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">✓ Business Hours</text>

  <rect x="320" y="205" width="160" height="30" fill="#fff3cd" stroke="#ffc107"/>
  <text x="400" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#856404">⚠ Cross-Department</text>

  <!-- Environment arrow -->
  <line x1="170" y1="220" x2="320" y2="180" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Context</text>

  <!-- Resource arrow -->
  <line x1="630" y1="100" x2="500" y2="120" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Resource Info</text>

  <!-- Action arrow -->
  <line x1="630" y1="205" x2="500" y2="200" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">Action</text>

  <!-- Decision -->
  <rect x="350" y="300" width="100" height="40" rx="10" fill="#27ae60" stroke="#229954" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">GRANTED</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Emergency Override</text>

  <!-- Decision arrow -->
  <line x1="400" y1="260" x2="400" y2="300" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Policy Examples -->
  <rect x="50" y="380" width="700" height="100" rx="5" fill="#e8f5e8" stroke="#27ae60"/>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#155724">Dynamic Policy Examples</text>

  <text x="200" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#155724">Healthcare</text>
  <text x="200" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Access during shift hours</text>
  <text x="200" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Emergency overrides allowed</text>

  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#155724">Banking</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Location-based restrictions</text>
  <text x="400" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Time &amp; amount limits</text>

  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#155724">Cloud Services</text>
  <text x="600" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Project &amp; resource scoping</text>
  <text x="600" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#155724">Cost center validation</text>
</svg>