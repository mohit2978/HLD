<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">OAuth2 Sequential Flow: Google Docs Access</text>

  <!-- Actor boxes -->
  <!-- User/Browser -->
  <rect x="50" y="50" width="100" height="50" rx="8" fill="#673AB7" stroke="#512DA8" stroke-width="2"/>
  <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">User</text>
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Browser</text>

  <!-- DocEditor App -->
  <rect x="220" y="50" width="100" height="50" rx="8" fill="#009688" stroke="#00796B" stroke-width="2"/>
  <text x="270" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">DocEditor</text>
  <text x="270" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">App</text>

  <!-- Google OAuth -->
  <rect x="450" y="50" width="100" height="50" rx="8" fill="#4285F4" stroke="#1976D2" stroke-width="2"/>
  <text x="500" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Google</text>
  <text x="500" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">OAuth</text>

  <!-- Google Docs API -->
  <rect x="650" y="50" width="100" height="50" rx="8" fill="#0F9D58" stroke="#0D7642" stroke-width="2"/>
  <text x="700" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Google Docs</text>
  <text x="700" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">API</text>

  <!-- Vertical lifelines -->
  <line x1="100" y1="100" x2="100" y2="450" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="270" y1="100" x2="270" y2="450" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="500" y1="100" x2="500" y2="450" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="700" y1="100" x2="700" y2="450" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowSeq" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Step 1: User clicks import -->
  <line x1="100" y1="130" x2="270" y2="130" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="185" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e74c3c">1. "Import Google Docs"</text>

  <!-- Step 2: Redirect to OAuth -->
  <line x1="270" y1="160" x2="500" y2="160" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="385" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ff6b35">2. Redirect to OAuth</text>
  <text x="385" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff6b35">scope=docs.readonly, client_id=xyz</text>

  <!-- Step 3: OAuth redirect to user -->
  <line x1="500" y1="190" x2="100" y2="190" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="300" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9b59b6">3. Show login page</text>

  <!-- Step 4: User authenticates -->
  <line x1="100" y1="220" x2="500" y2="220" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="300" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8e44ad">4. Login credentials</text>

  <!-- Step 5: Consent prompt -->
  <line x1="500" y1="250" x2="100" y2="250" stroke="#663399" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="300" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#663399">5. "Allow DocEditor to view docs?"</text>

  <!-- Step 6: User grants permission -->
  <line x1="100" y1="280" x2="500" y2="280" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">6. User clicks "Allow"</text>

  <!-- Step 7a: Authorization code to user -->
  <line x1="500" y1="310" x2="100" y2="310" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="300" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2ecc71">7a. Redirect with auth code</text>

  <!-- Step 7b: Browser follows redirect to app -->
  <line x1="100" y1="335" x2="270" y2="335" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="185" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">7b. Browser follows redirect</text>
  <text x="185" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">GET /callback?code=abc123xyz</text>

  <!-- Step 8: Exchange code for token -->
  <line x1="270" y1="365" x2="500" y2="365" stroke="#3498db" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="385" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498db">8. Exchange code + client_secret</text>

  <!-- Step 9: Access token returned -->
  <line x1="500" y1="390" x2="270" y2="390" stroke="#1abc9c" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="385" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1abc9c">9. Access token (expires 1hr)</text>

  <!-- Step 10: API call to Google Docs -->
  <line x1="270" y1="415" x2="700" y2="415" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="485" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f39c12">10. GET /docs/v1/documents</text>
  <text x="485" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Authorization: Bearer [token]</text>

  <!-- Step 11: Document data returned -->
  <line x1="700" y1="445" x2="270" y2="445" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowSeq)"/>
  <text x="485" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e67e22">11. Document content (JSON)</text>

  <!-- Activation boxes (showing when each component is active) -->
  <rect x="265" y="125" width="10" height="340" fill="#009688" opacity="0.3"/>
  <rect x="495" y="155" width="10" height="240" fill="#4285F4" opacity="0.3"/>
  <rect x="695" y="410" width="10" height="35" fill="#0F9D58" opacity="0.3"/>

  <!-- Note about secure flow -->
  <rect x="50" y="465" width="700" height="25" rx="5" fill="#ffffcc" stroke="#f39c12" stroke-width="1"/>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-style="italic">
    ✓ No passwords shared • ✓ Limited scope • ✓ User consent • ✓ Temporary access
  </text>
</svg>
