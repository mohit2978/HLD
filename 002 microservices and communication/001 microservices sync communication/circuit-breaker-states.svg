<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Circuit Breaker States</text>

  <!-- CLOSED State -->
  <rect x="50" y="80" width="200" height="140" fill="#d4edda" rx="10" stroke="#27ae60" stroke-width="3"/>
  <text x="150" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">CLOSED</text>
  <text x="150" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Requests pass through</text>
  <text x="150" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Monitor failures:</text>
  <text x="150" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">5% failure rate ✓</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">Normal operation</text>

  <!-- OPEN State -->
  <rect x="550" y="80" width="200" height="140" fill="#fdf2f2" rx="10" stroke="#e74c3c" stroke-width="3"/>
  <text x="650" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e74c3c">OPEN</text>
  <text x="650" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Requests rejected</text>
  <text x="650" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">No calls to service</text>
  <text x="650" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Return errors instantly</text>
  <text x="650" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">Service failing</text>

  <!-- HALF-OPEN State -->
  <rect x="300" y="290" width="200" height="140" fill="#fff3cd" rx="10" stroke="#f39c12" stroke-width="3"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f39c12">HALF-OPEN</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Testing recovery</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Limited test requests</text>
  <text x="400" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">Check if service recovered</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12" font-weight="bold">Recovery phase</text>

  <!-- Transition: CLOSED to OPEN -->
  <line x1="250" y1="150" x2="545" y2="150" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">Failure rate > threshold</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">(e.g., 5% → 55%)</text>

  <!-- Transition: OPEN to HALF-OPEN -->
  <line x1="650" y1="220" x2="500" y2="285" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f39c12" font-weight="bold">After timeout</text>
  <text x="600" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">(e.g., 30 seconds)</text>

  <!-- Transition: HALF-OPEN to CLOSED (success) -->
  <line x1="300" y1="360" x2="150" y2="225" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">Test succeeds</text>
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Service recovered</text>

  <!-- Transition: HALF-OPEN to OPEN (failure) -->
  <line x1="500" y1="360" x2="650" y2="225" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">Test fails</text>
  <text x="600" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Still down</text>
</svg>
