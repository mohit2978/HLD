<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="450" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Cache-Always Pattern
  </text>

  <!-- WITHOUT CACHE (left side) -->
  <rect x="40" y="60" width="280" height="350" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="8"/>
  <text x="180" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e74c3c">
    WITHOUT Cache ❌
  </text>

  <!-- Users -->
  <g>
    <rect x="140" y="110" width="80" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
    <text x="180" y="132" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">
      Users
    </text>
    <text x="180" y="148" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">
      100M DAU
    </text>
  </g>

  <!-- Arrow to database -->
  <line x1="180" y1="160" x2="180" y2="230" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="210" y="200" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">
    1B queries/day
  </text>

  <!-- Database (overloaded) -->
  <g>
    <rect x="130" y="240" width="100" height="60" fill="#e74c3c" stroke="#c62828" stroke-width="2" rx="5"/>
    <text x="180" y="262" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">
      Database
    </text>
    <text x="180" y="278" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ffcdd2">
      OVERLOADED
    </text>
    <text x="180" y="292" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ffcdd2">
      500ms latency
    </text>
  </g>

  <!-- Problems -->
  <rect x="60" y="330" width="240" height="70" fill="#ffebee" stroke="#e74c3c" stroke-width="1" rx="3"/>
  <text x="180" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#c62828">
    Problems:
  </text>
  <text x="180" y="365" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">
    • Slow response times
  </text>
  <text x="180" y="380" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">
    • Database saturation
  </text>
  <text x="180" y="395" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">
    • High costs
  </text>

  <!-- WITH CACHE (right side) -->
  <rect x="380" y="60" width="280" height="350" fill="#fff" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="520" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">
    WITH Cache ✓
  </text>

  <!-- Users -->
  <g>
    <rect x="480" y="110" width="80" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/>
    <text x="520" y="132" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">
      Users
    </text>
    <text x="520" y="148" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">
      100M DAU
    </text>
  </g>

  <!-- Arrow to cache -->
  <line x1="520" y1="160" x2="520" y2="190" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="555" y="180" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">
    1B requests
  </text>

  <!-- Cache layer -->
  <g>
    <rect x="465" y="200" width="110" height="60" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
    <text x="520" y="222" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1976d2">
      Cache
    </text>
    <text x="520" y="238" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">
      Redis/Memcached
    </text>
    <text x="520" y="252" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1976d2">
      95% hit rate
    </text>
  </g>

  <!-- Arrow to database (small) -->
  <line x1="520" y1="260" x2="520" y2="300" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="555" y="285" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">
    50M queries
  </text>
  <text x="555" y="295" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">
    (5% miss)
  </text>

  <!-- Database (healthy) -->
  <g>
    <rect x="470" y="310" width="100" height="50" fill="#27ae60" stroke="#229954" stroke-width="2" rx="5"/>
    <text x="520" y="332" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">
      Database
    </text>
    <text x="520" y="348" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d5f4e6">
      10ms latency
    </text>
  </g>

  <!-- Benefits -->
  <rect x="400" y="380" width="240" height="20" fill="#e8f5e9" stroke="#27ae60" stroke-width="1" rx="3"/>
  <text x="520" y="394" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2e7d32">
    ⚡ 50x faster, 99% cost reduction
  </text>
</svg>
